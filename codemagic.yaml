workflows:
  android-workflow:
    name: Android Build

    environment:
      flutter: stable

    scripts:
      - flutter clean
      - flutter pub get
      - chmod +x android/gradlew
      - cd android && ./gradlew assembleRelease
      - cd ..
      - mkdir -p artifacts
      - find . -name "*.apk" -type f -exec cp {} artifacts/ \;
      - ls -R artifacts

    artifacts:
      - artifacts/*.apk
